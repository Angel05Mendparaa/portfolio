<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#E8F4FD"/>
  <ellipse cx="560" cy="320" rx="140" ry="110" fill="#BBDEFB" opacity="0.4"/>
  <ellipse cx="60" cy="80" rx="90" ry="70" fill="#FFF8E1" opacity="0.5"/>

  <!-- hero text -->
  <text font-family="Arial" font-size="32" font-weight="800" fill="#1565C0" x="36" y="68">Plan First.</text>
  <text font-family="Arial" font-size="32" font-weight="800" fill="#0D47A1" x="36" y="104">Explore Freely.</text>
  <text font-family="Arial" font-size="11" fill="#78909C" x="36" y="126">No booking pressure. Just smart travel planning.</text>

  <!-- 4 feature cards in a row -->
  <rect x="36" y="148" width="120" height="90" rx="10" fill="#fff" stroke="#90CAF9" stroke-width="1"/>
  <text font-family="Arial" font-size="20" x="96" y="186" text-anchor="middle">🗺</text>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#1565C0" x="96" y="206" text-anchor="middle">Explore</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="96" y="220" text-anchor="middle">Destinations</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="96" y="230" text-anchor="middle">and routes</text>

  <rect x="168" y="148" width="120" height="90" rx="10" fill="#fff" stroke="#A5D6A7" stroke-width="1"/>
  <text font-family="Arial" font-size="20" x="228" y="186" text-anchor="middle">💰</text>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#2E7D32" x="228" y="206" text-anchor="middle">Cost</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="228" y="220" text-anchor="middle">Estimate your</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="228" y="230" text-anchor="middle">budget</text>

  <rect x="300" y="148" width="120" height="90" rx="10" fill="#fff" stroke="#FFCC80" stroke-width="1"/>
  <text font-family="Arial" font-size="20" x="360" y="186" text-anchor="middle">📅</text>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#E65100" x="360" y="206" text-anchor="middle">Itinerary</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="360" y="220" text-anchor="middle">Build day-by-day</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="360" y="230" text-anchor="middle">plans</text>

  <rect x="432" y="148" width="120" height="90" rx="10" fill="#fff" stroke="#CE93D8" stroke-width="1"/>
  <text font-family="Arial" font-size="20" x="492" y="186" text-anchor="middle">🧭</text>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#6A1B9A" x="492" y="206" text-anchor="middle">Decide</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="492" y="220" text-anchor="middle">Confident travel</text>
  <text font-family="Arial" font-size="7" fill="#78909C" x="492" y="230" text-anchor="middle">decisions</text>

  <!-- trip card -->
  <rect x="36" y="256" width="340" height="124" rx="12" fill="#fff" stroke="#B3D4F5" stroke-width="1"/>
  <text font-family="Arial" font-size="10" font-weight="700" fill="#1565C0" x="52" y="278">My Next Trip</text>
  <rect x="52" y="284" width="66" height="18" rx="5" fill="#1565C0"/>
  <text font-family="Arial" font-size="7" fill="#fff" x="85" y="293" text-anchor="middle" dominant-baseline="middle">Rajasthan</text>
  <rect x="128" y="284" width="66" height="18" rx="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.8"/>
  <text font-family="Arial" font-size="7" fill="#1565C0" x="161" y="293" text-anchor="middle" dominant-baseline="middle">7 Days</text>
  <rect x="204" y="284" width="66" height="18" rx="5" fill="#FFF8E1" stroke="#FFE082" stroke-width="0.8"/>
  <text font-family="Arial" font-size="7" fill="#E65100" x="237" y="293" text-anchor="middle" dominant-baseline="middle">₹18,000</text>

  <text font-family="Arial" font-size="8" fill="#546E7A" x="52" y="322">Jaipur · Jodhpur · Udaipur · Jaisalmer</text>
  <text font-family="Arial" font-size="7" fill="#90A4AE" x="52" y="338">Best in: Oct–Mar · Culture, Heritage, Desert</text>

  <!-- progress bar -->
  <text font-family="Arial" font-size="7" fill="#90A4AE" x="52" y="354">Planning progress</text>
  <rect x="52" y="358" width="300" height="8" rx="4" fill="#E3F2FD"/>
  <rect x="52" y="358" width="195" height="8" rx="4" fill="#1565C0"/>
  <text font-family="Arial" font-size="7" fill="#1565C0" x="260" y="366" dominant-baseline="middle">65%</text>

  <!-- tip card -->
  <rect x="392" y="256" width="172" height="124" rx="12" fill="#1565C0"/>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#fff" x="478" y="280" text-anchor="middle">Travel Tip</text>
  <text font-family="Arial" font-size="8" fill="#90CAF9" x="408" y="298">Book Jaipur–Jodhpur</text>
  <text font-family="Arial" font-size="8" fill="#90CAF9" x="408" y="312">train 60 days early.</text>
  <text font-family="Arial" font-size="8" fill="#90CAF9" x="408" y="326">Rajdhani Express</text>
  <text font-family="Arial" font-size="8" fill="#90CAF9" x="408" y="340">saves ₹1,200 vs bus.</text>
  <text font-family="Arial" font-size="7" fill="#64B5F6" x="408" y="366">No booking required →</text>
  <text font-family="Arial" font-size="7" fill="#64B5F6" x="408" y="376">just information.</text>
</svg>
