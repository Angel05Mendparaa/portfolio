<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F0F7FF"/>
  <ellipse cx="560" cy="360" rx="120" ry="90" fill="#BBDEFB" opacity="0.4"/>

  <!-- title area -->
  <rect x="0" y="0" width="600" height="60" fill="#1565C0"/>
  <text font-family="Arial" font-size="16" font-weight="800" fill="#fff" x="30" y="28">CareFlow Nexus</text>
  <text font-family="Arial" font-size="9" fill="#90CAF9" x="30" y="46">Smart Hospital Resource Orchestration</text>
  <!-- live indicator -->
  <circle cx="552" cy="24" r="5" fill="#69F0AE"/>
  <text font-family="Arial" font-size="8" fill="#B2DFDB" x="562" y="28">LIVE</text>

  <!-- three dashboard panels -->
  <!-- reception -->
  <rect x="20" y="76" width="170" height="220" rx="12" fill="#fff" stroke="#BBDEFB" stroke-width="1"/>
  <rect x="20" y="76" width="170" height="32" rx="12" fill="#1976D2"/>
  <rect x="20" y="96" width="170" height="12" rx="0" fill="#1976D2"/>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#fff" x="105" y="96" text-anchor="middle">Reception</text>

  <text font-family="Arial" font-size="8" fill="#546E7A" x="34" y="126">Incoming patients</text>
  <rect x="34" y="132" width="142" height="18" rx="4" fill="#E3F2FD"/>
  <text font-family="Arial" font-size="7" fill="#1565C0" x="42" y="144" dominant-baseline="middle">P-1044 · Neurology</text>
  <rect x="34" y="156" width="142" height="18" rx="4" fill="#E3F2FD"/>
  <text font-family="Arial" font-size="7" fill="#1565C0" x="42" y="168" dominant-baseline="middle">P-1045 · General</text>
  <rect x="34" y="180" width="142" height="18" rx="4" fill="#E8F5E9"/>
  <text font-family="Arial" font-size="7" fill="#2E7D32" x="42" y="192" dominant-baseline="middle">P-1046 · Admitted</text>

  <text font-family="Arial" font-size="8" fill="#546E7A" x="34" y="218">Bed requests: 3</text>
  <rect x="34" y="226" width="66" height="22" rx="6" fill="#1565C0"/>
  <text font-family="Arial" font-size="8" fill="#fff" x="67" y="237" text-anchor="middle" dominant-baseline="middle">Allocate</text>
  <rect x="110" y="226" width="66" height="22" rx="6" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.8"/>
  <text font-family="Arial" font-size="8" fill="#1565C0" x="143" y="237" text-anchor="middle" dominant-baseline="middle">Queue</text>

  <!-- nursing -->
  <rect x="210" y="76" width="170" height="220" rx="12" fill="#fff" stroke="#B3E5FC" stroke-width="1"/>
  <rect x="210" y="76" width="170" height="32" rx="12" fill="#0277BD"/>
  <rect x="210" y="96" width="170" height="12" rx="0" fill="#0277BD"/>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#fff" x="295" y="96" text-anchor="middle">Nursing</text>

  <text font-family="Arial" font-size="8" fill="#546E7A" x="224" y="126">Task board</text>
  <rect x="224" y="132" width="142" height="16" rx="3" fill="#E8F5E9"/>
  <text font-family="Arial" font-size="7" fill="#2E7D32" x="228" y="144" dominant-baseline="middle">Vitals A08 · Done</text>
  <rect x="224" y="152" width="142" height="16" rx="3" fill="#FFF9C4"/>
  <text font-family="Arial" font-size="7" fill="#F57F17" x="228" y="164" dominant-baseline="middle">Meds A02 · Pending</text>
  <rect x="224" y="172" width="142" height="16" rx="3" fill="#FFF9C4"/>
  <text font-family="Arial" font-size="7" fill="#F57F17" x="228" y="184" dominant-baseline="middle">Check A11 · Pending</text>
  <rect x="224" y="192" width="142" height="16" rx="3" fill="#E3F2FD"/>
  <text font-family="Arial" font-size="7" fill="#1565C0" x="228" y="204" dominant-baseline="middle">Discharge A03 · Sched</text>

  <text font-family="Arial" font-size="8" fill="#546E7A" x="224" y="228">Nurses on shift: 6</text>
  <!-- mini staff dots -->
  <circle cx="230" cy="244" r="7" fill="#64B5F6"/>
  <circle cx="246" cy="244" r="7" fill="#64B5F6"/>
  <circle cx="262" cy="244" r="7" fill="#64B5F6"/>
  <circle cx="278" cy="244" r="7" fill="#90CAF9"/>
  <circle cx="294" cy="244" r="7" fill="#90CAF9"/>
  <circle cx="310" cy="244" r="7" fill="#BBDEFB"/>

  <!-- doctor -->
  <rect x="400" y="76" width="170" height="220" rx="12" fill="#fff" stroke="#B2DFDB" stroke-width="1"/>
  <rect x="400" y="76" width="170" height="32" rx="12" fill="#00838F"/>
  <rect x="400" y="96" width="170" height="12" rx="0" fill="#00838F"/>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#fff" x="485" y="96" text-anchor="middle">Doctor</text>

  <text font-family="Arial" font-size="8" fill="#546E7A" x="414" y="126">Patient summaries</text>
  <rect x="414" y="132" width="142" height="42" rx="6" fill="#E0F7FA" stroke="#80DEEA" stroke-width="0.8"/>
  <text font-family="Arial" font-size="8" font-weight="600" fill="#006064" x="420" y="148">P-1042 · Ortho</text>
  <text font-family="Arial" font-size="7" fill="#4DD0E1" x="420" y="160">BP 120/80 · Stable</text>
  <text font-family="Arial" font-size="7" fill="#00897B" x="420" y="170">Discharge ready</text>

  <rect x="414" y="180" width="142" height="42" rx="6" fill="#FFEBEE" stroke="#EF9A9A" stroke-width="0.8"/>
  <text font-family="Arial" font-size="8" font-weight="600" fill="#B71C1C" x="420" y="196">P-1038 · Cardio</text>
  <text font-family="Arial" font-size="7" fill="#E57373" x="420" y="208">BP 150/95 · Monitor</text>
  <text font-family="Arial" font-size="7" fill="#EF9A9A" x="420" y="218">Needs review</text>

  <rect x="414" y="228" width="66" height="22" rx="6" fill="#00838F"/>
  <text font-family="Arial" font-size="8" fill="#fff" x="447" y="239" text-anchor="middle" dominant-baseline="middle">Review</text>

  <!-- bottom realtime bar -->
  <rect x="20" y="308" width="560" height="72" rx="10" fill="#1A237E"/>
  <text font-family="Arial" font-size="9" font-weight="700" fill="#90CAF9" x="36" y="326">Real-time Orchestration</text>
  <text font-family="Arial" font-size="8" fill="#7986CB" x="36" y="344">Reception assigns beds · Nurses get instant task updates · Doctors see live patient status</text>

  <!-- bar segments -->
  <rect x="36" y="354" width="86" height="14" rx="4" fill="#283593" stroke="#3949AB" stroke-width="0.5"/>
  <text font-family="Arial" font-size="7" fill="#90CAF9" x="79" y="361" text-anchor="middle" dominant-baseline="middle">Bed Util. 74%</text>
  <rect x="130" y="354" width="86" height="14" rx="4" fill="#283593" stroke="#3949AB" stroke-width="0.5"/>
  <text font-family="Arial" font-size="7" fill="#90CAF9" x="173" y="361" text-anchor="middle" dominant-baseline="middle">Staff Load 82%</text>
  <rect x="224" y="354" width="86" height="14" rx="4" fill="#283593" stroke="#3949AB" stroke-width="0.5"/>
  <text font-family="Arial" font-size="7" fill="#90CAF9" x="267" y="361" text-anchor="middle" dominant-baseline="middle">Avg Wait 8 min</text>
  <rect x="318" y="354" width="86" height="14" rx="4" fill="#283593" stroke="#3949AB" stroke-width="0.5"/>
  <text font-family="Arial" font-size="7" fill="#90CAF9" x="361" y="361" text-anchor="middle" dominant-baseline="middle">Discharge: 4 today</text>
</svg>
