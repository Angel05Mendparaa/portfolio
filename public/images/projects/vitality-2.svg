  <!-- table header -->
  <rect x="40" y="256" width="520" height="20" rx="0" fill="#4527A0"/>
  <text font-family="Arial" font-size="7" font-weight="700" fill="#EDE7F6" x="80" y="270" text-anchor="middle">Embryo</text>
  <text font-family="Arial" font-size="7" font-weight="700" fill="#EDE7F6" x="180" y="270" text-anchor="middle">Grade</text>
  <text font-family="Arial" font-size="7" font-weight="700" fill="#EDE7F6" x="280" y="270" text-anchor="middle">ICM</text>
  <text font-family="Arial" font-size="7" font-weight="700" fill="#EDE7F6" x="380" y="270" text-anchor="middle">TE</text>
  <text font-family="Arial" font-size="7" font-weight="700" fill="#EDE7F6" x="490" y="270" text-anchor="middle">Recommendation</text>

  <!-- rows -->
  <text font-family="Arial" font-size="7" fill="#CE93D8" x="80" y="292" text-anchor="middle">E-01</text>
  <text font-family="Arial" font-size="7" fill="#E1BEE7" x="180" y="292" text-anchor="middle">4AA</text>
  <text font-family="Arial" font-size="7" fill="#69F0AE" x="280" y="292" text-anchor="middle">Excellent</text>
  <text font-family="Arial" font-size="7" fill="#69F0AE" x="380" y="292" text-anchor="middle">Excellent</text>
  <rect x="446" y="282" width="88" height="14" rx="4" fill="#1B5E20"/>
