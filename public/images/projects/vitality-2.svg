  <text font-family="Arial" font-size="32" font-weight="800" fill="#CE93D8" x="117" y="174" text-anchor="middle">47</text>
  <text font-family="Arial" font-size="7" fill="#7E57C2" x="117" y="196" text-anchor="middle">this cycle</text>

  <rect x="208" y="108" width="154" height="100" rx="12" fill="#2D1B5E" stroke="#7E57C2" stroke-width="0.8"/>
  <text font-family="Arial" font-size="9" fill="#B39DDB" x="285" y="128" text-anchor="middle">Avg. Score</text>
  <text font-family="Arial" font-size="32" font-weight="800" fill="#E1BEE7" x="285" y="174" text-anchor="middle">83</text>
