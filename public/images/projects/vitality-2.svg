  <rect x="376" y="108" width="184" height="100" rx="12" fill="#2D1B5E" stroke="#9575CD" stroke-width="0.8"/>
  <text font-family="Arial" font-size="9" fill="#B39DDB" x="468" y="128" text-anchor="middle">Transfer Success Rate</text>
  <text font-family="Arial" font-size="32" font-weight="800" fill="#69F0AE" x="468" y="174" text-anchor="middle">68%</text>
  <text font-family="Arial" font-size="7" fill="#4DB6AC" x="468" y="196" text-anchor="middle">last 6 cycles</text>

  <!-- comparison table -->
  <rect x="40" y="226" width="520" height="150" rx="10" fill="#2D1B5E" stroke="#4A148C" stroke-width="0.8"/>
