<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#1A0533"/>
  <ellipse cx="500" cy="80" rx="200" ry="140" fill="#4A148C" opacity="0.3"/>
