  <rect x="40" y="298" width="520" height="1" fill="#4A148C" opacity="0.5"/>

  <text font-family="Arial" font-size="7" fill="#CE93D8" x="80" y="316" text-anchor="middle">E-02</text>
  <text font-family="Arial" font-size="7" fill="#E1BEE7" x="180" y="316" text-anchor="middle">3BB</text>
  <text font-family="Arial" font-size="7" fill="#FFE082" x="280" y="316" text-anchor="middle">Good</text>
  <text font-family="Arial" font-size="7" fill="#FFE082" x="380" y="316" text-anchor="middle">Good</text>
  <rect x="446" y="306" width="88" height="14" rx="4" fill="#1A237E"/>
  <text font-family="Arial" font-size="7" fill="#90CAF9" x="490" y="316" text-anchor="middle">Freeze</text>

  <rect x="40" y="322" width="520" height="1" fill="#4A148C" opacity="0.5"/>

  <text font-family="Arial" font-size="7" fill="#CE93D8" x="80" y="340" text-anchor="middle">E-03</text>
  <text font-family="Arial" font-size="7" fill="#E1BEE7" x="180" y="340" text-anchor="middle">3BC</text>
  <text font-family="Arial" font-size="7" fill="#FFAB91" x="280" y="340" text-anchor="middle">Good</text>
  <text font-family="Arial" font-size="7" fill="#EF9A9A" x="380" y="340" text-anchor="middle">Fair</text>
  <rect x="446" y="330" width="88" height="14" rx="4" fill="#3E2723"/>
  <text font-family="Arial" font-size="7" fill="#FFAB91" x="490" y="340" text-anchor="middle">Review</text>

  <rect x="40" y="346" width="520" height="1" fill="#4A148C" opacity="0.5"/>

  <text font-family="Arial" font-size="7" fill="#CE93D8" x="80" y="364" text-anchor="middle">E-04</text>
  <text font-family="Arial" font-size="7" fill="#E1BEE7" x="180" y="364" text-anchor="middle">2CC</text>
  <text font-family="Arial" font-size="7" fill="#EF9A9A" x="280" y="364" text-anchor="middle">Poor</text>
  <text font-family="Arial" font-size="7" fill="#EF9A9A" x="380" y="364" text-anchor="middle">Poor</text>
  <rect x="446" y="354" width="88" height="14" rx="4" fill="#4E342E"/>
  <text font-family="Arial" font-size="7" fill="#FFCDD2" x="490" y="364" text-anchor="middle">Discard</text>
