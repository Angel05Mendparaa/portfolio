<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <rect width="600" height="400" fill="#F0F8FF"/>
  <ellipse cx="560" cy="80" rx="130" ry="100" fill="#DDEEFF" opacity="0.6"/>
  <ellipse cx="40" cy="350" rx="100" ry="80" fill="#FFF8E1" opacity="0.6"/>

  <!-- left panel: destination list -->
