  <text font-family="Arial" font-size="7" fill="#F57C00" x="88" y="209" dominant-baseline="middle">Est. ₹9,500 · 4 days</text>
  <text font-family="Arial" font-size="7" fill="#FFA726" x="88" y="220" dominant-baseline="middle">Oct–Mar best season</text>

  <rect x="32" y="232" width="166" height="50" rx="8" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="0.8"/>
  <rect x="36" y="236" width="40" height="42" rx="5" fill="#43A047" opacity="0.2"/>
  <text font-family="Arial" font-size="16" x="56" y="262" text-anchor="middle" dominant-baseline="middle">🌿</text>
  <text font-family="Arial" font-size="8" font-weight="700" fill="#1B5E20" x="88" y="252" dominant-baseline="middle">Coorg, Karnataka</text>
  <text font-family="Arial" font-size="7" fill="#2E7D32" x="88" y="265" dominant-baseline="middle">Est. ₹7,200 · 3 days</text>
