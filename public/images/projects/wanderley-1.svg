  <rect x="242" y="316" width="322" height="14" rx="3" fill="#F5F5F5"/>
  <text font-family="Arial" font-size="7" fill="#546E7A" x="248" y="327" dominant-baseline="middle">Day 3 · Kullu · Manikaran · River rafting</text>
  <rect x="242" y="334" width="322" height="14" rx="3" fill="#F5F5F5"/>
  <text font-family="Arial" font-size="7" fill="#546E7A" x="248" y="345" dominant-baseline="middle">Day 4 · Naggar Castle · Local market</text>
  <rect x="242" y="352" width="322" height="14" rx="3" fill="#F5F5F5"/>
  <text font-family="Arial" font-size="7" fill="#546E7A" x="248" y="363" dominant-baseline="middle">Day 5 · Return journey · Depart evening bus</text>
</svg>
