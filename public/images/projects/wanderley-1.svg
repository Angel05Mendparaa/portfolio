  <rect x="242" y="180" width="322" height="70" rx="8" fill="#F0F8FF" stroke="#B3D4F5" stroke-width="0.8"/>

  <rect x="254" y="192" width="140" height="12" rx="3" fill="#BBDEFB"/>
  <rect x="254" y="192" width="112" height="12" rx="3" fill="#1565C0"/>
  <text font-family="Arial" font-size="7" fill="#E3F2FD" x="258" y="203" dominant-baseline="middle">Transport · ₹4,200</text>

  <rect x="254" y="210" width="140" height="12" rx="3" fill="#BBDEFB"/>
  <rect x="254" y="210" width="84" height="12" rx="3" fill="#1976D2"/>
  <text font-family="Arial" font-size="7" fill="#E3F2FD" x="258" y="221" dominant-baseline="middle">Stay · ₹3,500</text>

  <rect x="254" y="228" width="140" height="12" rx="3" fill="#BBDEFB"/>
  <rect x="254" y="228" width="56" height="12" rx="3" fill="#42A5F5"/>
  <text font-family="Arial" font-size="7" fill="#E3F2FD" x="258" y="239" dominant-baseline="middle">Food · ₹2,300</text>

  <text font-family="Arial" font-size="8" font-weight="700" fill="#0D47A1" x="408" y="242" text-anchor="end">Total: ₹10,000–₹14,000</text>

