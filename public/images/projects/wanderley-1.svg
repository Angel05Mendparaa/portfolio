  <polygon points="310,120 360,60 410,120" fill="#0D47A1" opacity="0.6"/>
  <polygon points="380,120 430,70 490,120" fill="#1976D2" opacity="0.5"/>
  <polygon points="270,120 310,80 355,120" fill="#0D47A1" opacity="0.4"/>
