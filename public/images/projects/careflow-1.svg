  <rect x="248" y="138" width="44" height="28" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.8"/>
  <text font-family="Arial" font-size="8" fill="#1565C0" x="270" y="156" text-anchor="middle">A09 Free</text>
  <rect x="298" y="138" width="44" height="28" rx="4" fill="#E3F2FD" stroke="#90CAF9" stroke-width="0.8"/>
  <text font-family="Arial" font-size="8" fill="#1565C0" x="320" y="156" text-anchor="middle">A10 Free</text>
  <rect x="348" y="138" width="44" height="28" rx="4" fill="#BBDEFB" stroke="#64B5F6" stroke-width="0.8"/>
  <text font-family="Arial" font-size="8" fill="#0D47A1" x="370" y="156" text-anchor="middle">A11 Occ.</text>
  <rect x="398" y="138" width="44" height="28" rx="4" fill="#FFF9C4" stroke="#FDD835" stroke-width="0.8"/>
