  <rect x="400" y="204" width="48" height="18" rx="6" fill="#FFF9C4" stroke="#FDD835" stroke-width="0.8"/>
  <text font-family="Arial" font-size="7" fill="#F57F17" x="424" y="213" text-anchor="middle" dominant-baseline="middle">Assign</text>

  <rect x="148" y="232" width="300" height="26" rx="6" fill="#fff" stroke="#BBDEFB" stroke-width="1"/>
