  <text font-family="Arial" font-size="7" fill="#FFA726" x="542" y="338" text-anchor="end" dominant-baseline="middle">Pending</text>

  <rect x="148" y="356" width="440" height="24" rx="6" fill="#E8F4FD" stroke="#90CAF9" stroke-width="0.8"/>
  <text font-family="Arial" font-size="8" fill="#0D47A1" x="162" y="368" dominant-baseline="middle">Reception — A04 — Room sanitization</text>
